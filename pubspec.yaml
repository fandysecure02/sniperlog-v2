name: sniperlog
description: SniperLog - Jurnal Trading Scalper

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Database Lokal
  sqflite: ^2.3.0
  path: ^1.9.0

  # Shared Preferences untuk balance awal
  shared_preferences: ^2.3.0

  # Image Picker untuk screenshot
  image_picker: ^1.1.2

  # Path Provider untuk folder dokumen
  path_provider: ^2.1.3

  # Export / Share file
  share_plus: ^10.1.4

  # Font Poppins
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
